name: Tests (macOS)

on:
  push:
    branches:
      - main
    paths:
      - "VERSION"
      - "bin/**"
      - "profiles/**"
      - "scripts/**"
      - "docs/docs/**"
      - "docs/public/**"
      - "docs/.vitepress/config.ts"
      - "tests/policy/**"
      - "tests/surface/**"
      - "tests/run.sh"
      - "tests/setup_suite.bash"
      - "tests/test_helper.bash"
      - "dist/safehouse.sh"
      - ".github/workflows/tests-macos.yml"
      - ".github/workflows/regenerate-dist.yml"
  pull_request:
    paths:
      - "VERSION"
      - "bin/**"
      - "profiles/**"
      - "scripts/**"
      - "docs/docs/**"
      - "docs/public/**"
      - "docs/.vitepress/config.ts"
      - "tests/policy/**"
      - "tests/surface/**"
      - "tests/run.sh"
      - "tests/setup_suite.bash"
      - "tests/test_helper.bash"
      - "dist/safehouse.sh"
      - ".github/workflows/tests-macos.yml"
      - ".github/workflows/regenerate-dist.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  test-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install test and browser dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install bats-core parallel
          brew install --cask google-chrome temurin
          shopt -s nullglob
          temurin_homes=(/Library/Java/JavaVirtualMachines/temurin*.jdk/Contents/Home)
          shopt -u nullglob
          if [[ "${#temurin_homes[@]}" -eq 0 ]]; then
            echo "temurin install did not create a JDK under /Library/Java/JavaVirtualMachines" >&2
            exit 1
          fi
          printf 'JAVA_HOME=%s\n' "${temurin_homes[0]}" >> "${GITHUB_ENV}"
          printf '%s\n' "${temurin_homes[0]}/bin" >> "${GITHUB_PATH}"
          npm install --global --no-fund --no-audit agent-browser playwright
          agent-browser install
          playwright install chromium-headless-shell

      - name: Run default suites without browser launch smokes
        env:
          SAFEHOUSE_BATS_JOBS: "4"
        run: |
          ./tests/run.sh --negative-filter 'agent-browser|chromium-headless|chromium-full|playwright-chrome'

      - name: Run agent-browser integration smoke serially
        run: |
          pkill -x "Google Chrome" >/dev/null 2>&1 || true
          pkill -f 'chrome-headless-shell|HeadlessShell' >/dev/null 2>&1 || true
          bats --timing --print-output-on-failure \
            tests/policy/integrations/agent-browser.bats

      - name: Run Chromium and Playwright launch smokes serially
        run: |
          pkill -x "Google Chrome" >/dev/null 2>&1 || true
          pkill -f 'chrome-headless-shell|HeadlessShell' >/dev/null 2>&1 || true
          bats --timing --print-output-on-failure \
            tests/policy/integrations/chromium.bats \
            tests/policy/integrations/playwright-chrome.bats
